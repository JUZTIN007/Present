<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
/* 🌌 Animated Background */
body {
  margin:0;
  font-family:'Segoe UI';
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #fbc2eb, #a6c1ee);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* ✨ Card */
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.2),
    0 0 20px rgba(255,77,109,0.3);
  transition: all 0.5s ease;
}

.hidden {display:none;}

button {
  background:#ff4d6d;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
  margin:10px;
}
button:hover {background:#c9184a;}

input {
  padding:10px;
  border:2px solid #ff4d6d;
  border-radius:10px;
  width:70%;
  text-align:center;
}

/* ❤️ Floating hearts */
.heart {
  position:absolute;
  color:#ff4d6d;
  animation: float 5s linear infinite;
}
@keyframes float {
  0% {transform:translateY(0); opacity:1;}
  100% {transform:translateY(-100vh); opacity:0;}
}

/* 💭 Popup */
#popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:15px;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="card">

<!-- INTRO -->
<div id="step0">
  <h2 id="intro"></h2>
  <button onclick="nextStep(1)">Start</button>
</div>

<!-- PASSCODE -->
<div id="step1" class="hidden">
  <h2>Enter Code 🔐</h2>
  <p>Hint: Your Birthday</p>
  <input id="pass">
  <br>
  <button onclick="check()">Unlock</button>
</div>

<!-- MOMENTS -->
<div id="step2" class="hidden">
  <h2>Something about you…</h2>

  <button onclick="showMemory(1)">Moment 1</button>
  <button onclick="showMemory(2)">Moment 2</button>
  <button onclick="showMemory(3)">Moment 3</button>
  <button onclick="showMemory(4)">Moment 4</button>

  <br>
  <button onclick="nextStep(3)">Continue</button>
</div>

<!-- EMOTIONAL FLOW -->
<div id="step3" class="hidden">
  <div id="flow"></div>
  <button onclick="nextStep(4)">Continue</button>
</div>

<!-- QUESTION -->
<div id="step4" class="hidden">
  <h2>One question…</h2>
  <p>Am I your favorite?</p>
  <button onclick="nextStep(5)">Yes ❤️</button>
  <button id="no" onmouseover="moveNo()">No 😜</button>
</div>

<!-- CAKE -->
<div id="step5" class="hidden">
  <h2>Make a wish 🎂</h2>
  <div onclick="blow()" style="font-size:70px;cursor:pointer;">🔥</div>
</div>

<!-- MUSIC -->
<div id="step6" class="hidden">
  <h2>Just listen… 🎵</h2>
  <button onclick="playMusic()">Play</button>
  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
  </audio>
</div>

<!-- FINAL -->
<div id="step7" class="hidden">
  <h2>Happy Birthday ❤️</h2>
  <div id="final"></div>
  <button onclick="confettiBlast()">Celebrate 🎉</button>
</div>

</div>

<div id="popup"></div>

<script>

/* 🎧 Start music softly on first click */
window.onload = () => {
  let music = document.getElementById("music");
  music.volume = 0.15;

  document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
  }, { once: true });
};

/* ✨ INTRO */
let introText="Hey… just stay for a minute.";
let i=0;
function typeIntro(){
  if(i<introText.length){
    document.getElementById("intro").innerHTML+=introText.charAt(i);
    i++;
    setTimeout(typeIntro,50);
  }
}
typeIntro();

/* 🌫️ SMOOTH STEP TRANSITION */
function nextStep(n){
  let current = document.querySelector('.card > div:not(.hidden)');
  if(current){
    current.style.opacity = 0;
    setTimeout(()=>{
      current.classList.add('hidden');

      let next = document.getElementById('step'+n);
      next.classList.remove('hidden');
      next.style.opacity = 0;

      setTimeout(()=> next.style.opacity = 1,100);
    },400);
  }

  if(n==3) emotionalFlow();
  if(n==7) finalMessage();
}

/* 🔐 PASSCODE */
function check(){
  if(document.getElementById('pass').value==="2504"){
    nextStep(2);
  } else alert("Try again 😄");
}

/* 💭 MOMENTS */
const moments = [
`You don’t try too hard…
but you still stand out.`,

`There’s something calm about you…
not loud… but real.`,

`You look at the sky differently ✈️  
like you’re meant for more.`,

`You say you're okay…
but I don’t always believe that.`
];

function showMemory(i){
  let p=document.getElementById('popup');
  p.innerText= moments[i-1];
  p.style.display="block";
  setTimeout(()=>p.style.display="none",3000);
}

/* 💔 EMOTIONAL FLOW */
function emotionalFlow(){
  const lines = [
    "There’s something about you…",
    "",
    "You don’t always say much…",
    "but there’s a lot going on inside.",
    "",
    "And still…",
    "you choose to smile.",
    "",
    "That’s not easy.",
    "",
    "That’s you."
  ];

  let i = 0;
  const el = document.getElementById("flow");
  el.innerHTML = "";

  function showLine(){
    if(i < lines.length){
      let line = document.createElement("div");
      line.style.opacity = 0;
      line.style.transition = "opacity 1s";
      line.innerText = lines[i];
      el.appendChild(line);

      setTimeout(()=> line.style.opacity = 1,100);
      i++;
      setTimeout(showLine,1200);
    }
  }
  showLine();
}

/* ❤️ FINAL MESSAGE */
function finalMessage(){
  const lines = [
    "Happy Birthday…",
    "",
    "I didn’t make this to impress you.",
    "",
    "I made this because…",
    "you’re someone I notice.",
    "",
    "And I hope…",
    "",
    "this year…",
    "you feel as okay inside…",
    "as you make it look outside."
  ];

  let i = 0;
  const el = document.getElementById("final");
  el.innerHTML = "";

  function showLine(){
    if(i < lines.length){
      let line = document.createElement("div");
      line.style.opacity = 0;
      line.style.transition = "opacity 1s";
      line.innerText = lines[i];
      el.appendChild(line);

      setTimeout(()=> line.style.opacity = 1,100);
      i++;
      setTimeout(showLine,1400);
    }
  }
  showLine();
}

/* 😜 NO BUTTON */
function moveNo(){
  let b=document.getElementById('no');
  b.style.position='absolute';
  b.style.left=Math.random()*300+"px";
  b.style.top=Math.random()*300+"px";
}

/* 🎂 CAKE */
function blow(){
  document.querySelector('#step5 div').innerHTML="🎂";
  setTimeout(()=>nextStep(6),1500);
}

/* 🎵 MUSIC BUTTON */
function playMusic(){
  document.getElementById('music').play();
  nextStep(7);
}

/* 🎉 CONFETTI */
function confettiBlast(){
  confetti({particleCount:200,spread:80});
}

/* ❤️ FLOATING HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);

</script>

</body>
</html>
