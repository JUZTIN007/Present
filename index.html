<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight 2504</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
body {
    margin:0;
    background:#000;
    overflow:hidden;
    font-family: 'Inter', sans-serif;
    color:#fff;
}

#canvas-container {
    position:fixed;
    top:0; left:0;
}

.overlay {
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:85%;
    max-width:400px;
    text-align:center;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(20px);
    padding:25px;
    border-radius:20px;
    opacity:0;
    transition:1s;
}

.overlay.active {
    opacity:1;
    transform:translateX(-50%) translateY(-10px);
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#fff;
    color:#000;
    cursor:pointer;
}

#cake {
    font-size:40px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
<source src="your-music.mp3" type="audio/mpeg">
</audio>

<div id="canvas-container"></div>

<!-- STAGE 1 -->
<div id="stage1" class="overlay active">
<p id="text1"></p>
<button onclick="next(2)">Continue</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="overlay">
<p>Do you remember how we started?</p>
<button onclick="answer(false)">Random</button>
<button onclick="answer(true)">Somewhere unexpected</button>
<button onclick="answer(false)">I forgot</button>
</div>

<!-- STAGE 2 -->
<div id="stage2" class="overlay">
<p id="text2"></p>
<button onclick="next(3)">Continue</button>
</div>

<!-- FINAL -->
<div id="stage3" class="overlay">
<p id="finalText"></p>
<div id="cake" onclick="celebrate()">🎂</div>
</div>

<script>
let scene, camera, renderer, stars, plane;
let targetX = 0;

// INIT 3D
function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);
    renderer = new THREE.WebGLRenderer({alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    const light = new THREE.PointLight(0xffffff,1);
    light.position.set(5,5,5);
    scene.add(light);

    // STARS
    const geo = new THREE.BufferGeometry();
    let vertices=[];
    for(let i=0;i<4000;i++){
        vertices.push((Math.random()-0.5)*2000);
        vertices.push((Math.random()-0.5)*2000);
        vertices.push((Math.random()-0.5)*2000);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
    stars = new THREE.Points(geo,new THREE.PointsMaterial({size:1}));
    scene.add(stars);

    // PLANE
    const g = new THREE.ConeGeometry(0.5,2,8);
    const m = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0x222244});
    plane = new THREE.Mesh(g,m);
    plane.rotation.x = Math.PI/2;
    scene.add(plane);

    camera.position.z = 5;

    animate();
}

// ANIMATION
function animate(){
    requestAnimationFrame(animate);

    stars.position.z += 1;
    if(stars.position.z>500) stars.position.z=0;

    plane.rotation.z += (targetX - plane.rotation.z)*0.05;

    renderer.render(scene,camera);
}

// MOUSE PARALLAX
document.addEventListener("mousemove",(e)=>{
    targetX = (e.clientX/window.innerWidth - 0.5);
});

// TYPING EFFECT
function typeText(element, text, speed=40){
    let i=0;
    element.innerHTML="";
    let interval=setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;
        if(i>=text.length) clearInterval(interval);
    },speed);
}

// NAVIGATION
function next(step){
    document.querySelectorAll(".overlay").forEach(e=>e.classList.remove("active"));

    if(step===2){
        document.getElementById("quiz").classList.add("active");
    }
    if(step===3){
        document.getElementById("stage2").classList.add("active");
        typeText(document.getElementById("text2"),
        "Somehow… we came back. Not the same… but better.");
    }
}

// QUIZ
function answer(correct){
    if(correct){
        alert("See… you remember 😉");
        document.getElementById("quiz").classList.remove("active");
        document.getElementById("stage2").classList.add("active");

        typeText(document.getElementById("text2"),
        "Out of everything… we still found our way back.");
    } else {
        alert("Hmm… wrong 😌 try again");
    }
}

// FINAL
function celebrate(){
    document.getElementById("stage3").classList.add("active");

    typeText(document.getElementById("finalText"),
    "Not every story gets a second chance...\n\nBut ours did.\n\nAnd I'm glad it was with you.\n\nHappy Birthday ❤️");

    confetti({particleCount:400,spread:120});
}

// START MUSIC ON CLICK
document.body.addEventListener("click",()=>{
    document.getElementById("music").play();
},{once:true});

// START TEXT
window.onload=()=>{
    init();

    typeText(document.getElementById("text1"),
    "There was a time… we stopped talking.\n\nI didn't think we'd find this again.");
}
</script>

</body>
</html>
